<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Confirmacoes Maite 4 anos</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --pink-700:#BE185D; --pink-600:#DB2777; --pink-500:#EC4899; --pink-100:#FCE7F3; --pink-50:#FDF2F8; --ink:#5B1436; }
  *{box-sizing:border-box;}
  body{ font-family:'Quicksand',sans-serif; margin:0; min-height:100vh; background: radial-gradient(circle at 50% 0%, #FFF6FA 0%, var(--pink-50) 100%); color: var(--ink); padding:24px 16px 60px; }
  h1{ font-family:'Baloo 2',cursive; color:var(--pink-700); text-align:center; font-size:1.6rem; margin-bottom:4px;}
  p.sub{ text-align:center; color:#8a5570; margin-top:0; margin-bottom:24px; font-size:0.9rem;}
  .gate{ max-width:340px; margin:80px auto; background:#fff; border-radius:20px; padding:28px 22px; box-shadow:0 12px 30px rgba(219,39,119,0.2); text-align:center; }
  .gate input{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid var(--pink-100); font-size:1rem; margin:14px 0; text-align:center; }
  .gate button, .toolbar button{ background: linear-gradient(135deg, var(--pink-500), var(--pink-700)); color:#fff; border:none; font-family:'Baloo 2',cursive; font-weight:700; padding:12px 20px; border-radius:999px; font-size:1rem; cursor:pointer; min-height:44px; }
  #panel{ display:none; max-width:760px; margin:0 auto; }
  .stats{ display:flex; justify-content:center; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
  .stat{ background:#fff; border-radius:16px; padding:14px 22px; text-align:center; box-shadow:0 8px 20px rgba(219,39,119,0.14); min-width:110px; }
  .stat .n{ font-family:'Baloo 2',cursive; font-size:1.8rem; color:var(--pink-600); }
  .stat .l{ font-size:0.75rem; text-transform:uppercase; color:#8a5570; letter-spacing:0.5px; }
  .toolbar{ display:flex; justify-content:center; margin-bottom:18px; gap:10px; }
  .tabs{ display:flex; justify-content:center; gap:8px; margin-bottom:18px; }
  .tab-btn{ background:#fff; border:2px solid var(--pink-100); color:var(--pink-700); font-family:'Baloo 2',cursive; font-weight:700; padding:10px 18px; border-radius:999px; cursor:pointer; font-size:0.95rem; }
  .tab-btn.active{ background:linear-gradient(135deg, var(--pink-500), var(--pink-700)); color:#fff; border-color:transparent; }
  .tab-content{ display:none; }
  .tab-content.active{ display:block; }
  table{ width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 8px 20px rgba(219,39,119,0.1);}
  th,td{ padding:12px 14px; text-align:left; font-size:0.92rem; border-bottom:1px solid var(--pink-100);}
  th{ background:var(--pink-100); color:var(--pink-700); font-weight:700; }
  tr:last-child td{ border-bottom:none; }
  .empty{ text-align:center; color:#8a5570; padding:30px 0; }
  .msg-item{ background:#fff; border-radius:16px; padding:16px 18px; margin-bottom:12px; box-shadow:0 6px 16px rgba(219,39,119,0.1); border-left:5px solid var(--pink-100); }
  .msg-item.aprovado{ border-left-color:#16A34A; }
  .msg-item.pendente{ border-left-color:#F59E0B; }
  .msg-item .msg-nome{ font-family:'Baloo 2',cursive; font-weight:700; color:var(--pink-700); margin:0 0 6px; }
  .msg-item .msg-texto{ margin:0 0 10px; color:#5B1436; font-size:0.95rem; }
  .msg-item .msg-status{ font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; margin:0 0 10px; }
  .msg-item .msg-status.aprovado{ color:#16A34A; }
  .msg-item .msg-status.pendente{ color:#B45309; }
  .msg-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .msg-actions button{ border:none; border-radius:999px; padding:8px 16px; font-family:'Quicksand',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; }
  .btn-aprovar{ background:#DCFCE7; color:#16A34A; }
  .btn-reprovar{ background:#FEF3C7; color:#B45309; }
  .btn-excluir{ background:#FEE2E2; color:#DC2626; }
</style>

<script id="TIMEOUT_HELPER_V1">
window.withTimeout = function(promise, ms, label){
  return Promise.race([
    promise,
    new Promise(function(_, reject){
      setTimeout(function(){
        reject(new Error('Tempo esgotado (' + (label || 'operacao') + '). Provavel bloqueio de rede/extensao (ex: AdBlock) ou Firestore nao configurado.'));
      }, ms);
    })
  ]);
};
</script>
</head>
<body>

<div class="gate" id="gate">
  <h1>Área da família</h1>
  <p class="sub">Digite o código pra acessar o painel</p>
  <input type="password" id="codeInput" placeholder="Código de acesso">
  <button type="button" id="unlockBtn">Entrar</button>
</div>

<div id="panel">
  <h1>Painel - Maitê 4 anos</h1>
  <p class="sub">Domingo, 02/08/2026 - a partir das 16h30</p>

  <div class="stats">
    <div class="stat"><div class="n" id="totalConfirmados">0</div><div class="l">Confirmados</div></div>
    <div class="stat"><div class="n" id="totalPendentes">0</div><div class="l">Mensagens pendentes</div></div>
  </div>

  <div class="tabs">
    <button type="button" class="tab-btn active" data-tab="confirmacoes">Confirmações</button>
    <button type="button" class="tab-btn" data-tab="mensagens">Mensagens</button>
  </div>

  <div id="tab-confirmacoes" class="tab-content active">
    <div class="toolbar">
      <button type="button" id="exportBtn">Exportar CSV</button>
    </div>
    <div id="tableWrap"><p class="empty">Carregando...</p></div>
  </div>

  <div id="tab-mensagens" class="tab-content">
    <div id="msgsWrap"><p class="empty">Carregando...</p></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCevP3Fqygx3-PjdR6UpUfQwnLI3BTfihs",
  authDomain: "convite-maite-4anos.firebaseapp.com",
  projectId: "convite-maite-4anos",
  storageBucket: "convite-maite-4anos.firebasestorage.app",
  messagingSenderId: "1087577366187",
  appId: "1:1087577366187:web:9c05eddca64969cafca1ee"
};

const ACCESS_CODE = "maite04082026";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let rows = [];
let msgs = [];

document.getElementById('unlockBtn').addEventListener('click', async function(){
  const code = document.getElementById('codeInput').value.trim();
  if(code !== ACCESS_CODE){ alert('Código incorreto'); return; }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  await loadData();
  await loadMensagens();
});

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

async function loadData(){
  const wrap = document.getElementById('tableWrap');
  try{
    const q = query(collection(db, 'rsvps_maite4anos'), orderBy('confirmadoEm', 'desc'));
    const snap = await withTimeout(getDocs(q), 10000, 'carregar confirmacoes');
    rows = [];
    snap.forEach(function(d){
      const data = d.data();
      rows.push({
        nome: data.nome || '',
        telefone: data.telefone || '',
        data: data.confirmadoEm && data.confirmadoEm.toDate ? data.confirmadoEm.toDate().toLocaleString('pt-BR') : ''
      });
    });
    document.getElementById('totalConfirmados').textContent = rows.length;
    if(rows.length === 0){ wrap.innerHTML = '<p class="empty">Ninguém confirmou ainda.</p>'; return; }
    let html = '<table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Confirmado em</th></tr></thead><tbody>';
    rows.forEach(function(r){
      html += '<tr><td>' + escapeHtml(r.nome) + '</td><td>' + escapeHtml(r.telefone) + '</td><td>' + escapeHtml(r.data) + '</td></tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }catch(err){
    console.error(err);
    wrap.innerHTML = '<p class="empty">Erro ao carregar. Confere a configuração do Firebase.</p>';
  }
}

async function loadMensagens(){
  const wrap = document.getElementById('msgsWrap');
  try{
    const q = query(collection(db, 'mensagens_maite4anos'), orderBy('criadoEm', 'desc'));
    const snap = await withTimeout(getDocs(q), 10000, 'carregar mensagens');
    msgs = [];
    snap.forEach(function(d){
      msgs.push(Object.assign({ id: d.id }, d.data()));
    });
    document.getElementById('totalPendentes').textContent = msgs.filter(function(m){ return !m.aprovado; }).length;
    renderMensagens();
  }catch(err){
    console.error(err);
    wrap.innerHTML = '<p class="empty">Erro ao carregar mensagens.</p>';
  }
}

function renderMensagens(){
  const wrap = document.getElementById('msgsWrap');
  if(msgs.length === 0){ wrap.innerHTML = '<p class="empty">Nenhuma mensagem ainda.</p>'; return; }
  let html = '';
  msgs.forEach(function(m){
    const aprovado = !!m.aprovado;
    html += '<div class="msg-item ' + (aprovado ? 'aprovado' : 'pendente') + '">';
    html += '<p class="msg-nome">' + escapeHtml(m.nome || '') + '</p>';
    html += '<p class="msg-status ' + (aprovado ? 'aprovado' : 'pendente') + '">' + (aprovado ? 'Aprovada - visível no site' : 'Pendente') + '</p>';
    html += '<p class="msg-texto">' + escapeHtml(m.mensagem || '') + '</p>';
    html += '<div class="msg-actions">';
    if(!aprovado){
      html += '<button type="button" class="btn-aprovar" data-action="aprovar" data-id="' + m.id + '">Aprovar</button>';
    } else {
      html += '<button type="button" class="btn-reprovar" data-action="reprovar" data-id="' + m.id + '">Tirar do site</button>';
    }
    html += '<button type="button" class="btn-excluir" data-action="excluir" data-id="' + m.id + '">Excluir</button>';
    html += '</div></div>';
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll('button[data-action]').forEach(function(btn){
    btn.addEventListener('click', async function(){
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      btn.disabled = true;
      try{
        if(action === 'aprovar'){
          await updateDoc(doc(db, 'mensagens_maite4anos', id), { aprovado: true });
        } else if(action === 'reprovar'){
          await updateDoc(doc(db, 'mensagens_maite4anos', id), { aprovado: false });
        } else if(action === 'excluir'){
          if(!confirm('Tem certeza que quer excluir essa mensagem?')) { btn.disabled = false; return; }
          await deleteDoc(doc(db, 'mensagens_maite4anos', id));
        }
        await loadMensagens();
      }catch(err){
        console.error(err);
        alert('Erro ao atualizar a mensagem.');
        btn.disabled = false;
      }
    });
  });
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

document.getElementById('exportBtn').addEventListener('click', function(){
  if(rows.length === 0){ alert('Nada para exportar ainda'); return; }
  let csv = 'Nome,WhatsApp,Confirmado em\n';
  rows.forEach(function(r){
    csv += '"' + r.nome.replace(/"/g,'""') + '","' + r.telefone.replace(/"/g,'""') + '","' + r.data + '"\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'confirmacoes-maite-4anos.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
